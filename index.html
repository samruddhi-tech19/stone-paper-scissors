<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Stone Paper Scissors Game</title>
    <style>
        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(to right, #1d2671, #c33764);
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            color: #fff;
        }

        .game-box {
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(10px);
            width: 420px;
            padding: 30px;
            border-radius: 20px;
            text-align: center;
            box-shadow: 0 8px 20px rgba(0,0,0,0.4);
        }

        h1 {
            font-size: 2rem;
            margin-bottom: 20px;
            text-shadow: 2px 2px 6px #000;
        }

        .choices {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-bottom: 20px;
        }

        button.choice-btn {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            border: none;
            cursor: pointer;
            font-size: 2.5rem;
            transition: transform 0.2s, box-shadow 0.2s;
            background: rgba(255,255,255,0.2);
            display: flex;
            justify-content: center;
            align-items: center;
        }

        button.choice-btn:hover {
            transform: scale(1.2);
            box-shadow: 0 0 15px rgba(255,255,255,0.7);
        }

        .result {
            font-size: 1.2rem;
            margin-bottom: 15px;
            padding: 10px;
            border-radius: 10px;
            min-height: 50px;
            transition: all 0.3s;
        }

        .score {
            font-size: 1rem;
            margin-bottom: 15px;
        }

        button#reset {
            margin-top: 10px;
            padding: 8px 15px;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            background: #ff6b6b;
            color: white;
            font-weight: bold;
            transition: transform 0.2s;
        }

        button#reset:hover {
            transform: scale(1.1);
            box-shadow: 0 0 10px #ff6b6b;
        }

        .win { background: rgba(0,255,0,0.3); }
        .lose { background: rgba(255,0,0,0.3); }
        .draw { background: rgba(255,255,0,0.3); }
    </style>
</head>
<body>

<div class="game-box">
    <h1>Stone Paper Scissors</h1>

    <div class="choices">
        <button class="choice-btn" onclick="playGame('Stone')">✊</button>
        <button class="choice-btn" onclick="playGame('Paper')">✋</button>
        <button class="choice-btn" onclick="playGame('Scissors')">✌</button>
    </div>

    <div class="result" id="result"></div>
    <div class="score" id="score">Player: 0 | Computer: 0</div>
    <button id="reset" onclick="resetGame()">Reset Game</button>
</div>

<script>
    let playerScore = 0;
    let computerScore = 0;

    function playGame(playerChoice) {
        const choices = ["Stone", "Paper", "Scissors"];
        const computerChoice = choices[Math.floor(Math.random() * 3)];

        let resultText = `You chose ${playerChoice} <br>Computer chose ${computerChoice}`;

        const resultDiv = document.getElementById("result");

        if (playerChoice === computerChoice) {
            resultText += "<br>It's a Draw!";
            resultDiv.className = 'result draw';
        } 
        else if (
            (playerChoice === "Stone" && computerChoice === "Scissors") ||
            (playerChoice === "Paper" && computerChoice === "Stone") ||
            (playerChoice === "Scissors" && computerChoice === "Paper")
        ) {
            resultText += "<br>🎉 You Win!";
            playerScore++;
            resultDiv.className = 'result win';
        } 
        else {
            resultText += "<br>😢 Computer Wins!";
            computerScore++;
            resultDiv.className = 'result lose';
        }

        resultDiv.innerHTML = resultText;
        document.getElementById("score").innerHTML =
            `Player: ${playerScore} | Computer: ${computerScore}`;
    }

    function resetGame() {
        playerScore = 0;
        computerScore = 0;
        document.getElementById("score").innerHTML = `Player: 0 | Computer: 0`;
        document.getElementById("result").innerHTML = '';
        document.getElementById("result").className = 'result';
    }
</script>

</body>
</html>
